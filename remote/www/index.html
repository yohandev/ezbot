<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>ezbot remote</title>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <h1>ezbot</h1>
        <button id="open-upload">Upload firmware</button>

        <div id="upload-overlay">
            <div id="upload-modal">
                <button id="close-modal" aria-label="Close">&#x2715;</button>
                <h2>Upload firmware</h2>
                <div id="upload-actions">
                    <button id="upload-micropython">Upload MicroPython</button>
                    <button id="upload-files" style="display:none">Upload files</button>
                </div>
                <pre id="upload-log"></pre>
            </div>
        </div>

        <script src="index.js" defer></script>
    </body>
</html>
